name: Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.2.3)'
        required: true

jobs:
  build_apk:
    runs-on: ubuntu-latest
    steps:
      # 1. 检出源码
      - name: Checkout source
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 # 获取完整历史，确保能找到所有 tag

      - name: Checkout tag
        run: |
          # 确定目标 TAG
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${{ github.ref_name }}"
          fi
          
          echo "Target TAG: $TAG"
          
          # 切换到指定 TAG
          git fetch --tags --force
          git checkout "$TAG"
          
          echo "TAG=$TAG" >> $GITHUB_ENV

      # 2. 配置 JDK
      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3. 赋予 Gradle 可执行权限
      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      # 4. 导入签名密钥
      - name: Decode signing key
        run: |
          echo "${{ secrets.SIGNING_KEYSTORE_B64 }}" | base64 -d > release.keystore
          echo "RELEASE_STORE_FILE=${{ github.workspace }}/release.keystore" >> $GITHUB_ENV
          echo "RELEASE_KEY_ALIAS=${{ secrets.SIGNING_ALIAS }}" >> $GITHUB_ENV
          echo "RELEASE_STORE_PASSWORD=${{ secrets.SIGNING_STORE_PWD }}" >> $GITHUB_ENV
          echo "RELEASE_KEY_PASSWORD=${{ secrets.SIGNING_KEY_PWD }}" >> $GITHUB_ENV

      # 5. 编译 Release APK
      - name: Build Release APK
        run: ./gradlew assembleRelease --info

      # 6. 验证 APK 签名
      - name: Check APK signature
        run: |
          find tv/build/outputs/apk/release -name 'mytv-android-tv-*.apk' | while read apk; do
            echo "🔍  Checking $apk"
            "$ANDROID_SDK_ROOT/build-tools/34.0.0/apksigner" verify --verbose "$apk"
            if [ $? -ne 0 ]; then exit 1; fi
          done

      # 7. 定位 APK 文件
      - name: Locate APK
        id: apk
        run: |
          apk_path=$(find tv/build/outputs/apk/release -name 'mytv-android-tv-*.apk' | head -n1)
          [ -z "$apk_path" ] && { echo "❌ APK not found"; exit 1; }
          echo "Found APK: $apk_path"
          echo "apk_path=$apk_path" >> $GITHUB_OUTPUT

      # 8. 检测是否为 Beta 版本
      - name: Check if Beta
        id: check_beta
        run: |
          if [[ "${{ env.TAG }}" == *"beta"* ]]; then
            echo "is_beta=true" >> $GITHUB_OUTPUT
            echo "📢 Detected Beta release"
          else
            echo "is_beta=false" >> $GITHUB_OUTPUT
          fi

      # 9. 发布到 GitHub Release (自动创建或更新)
      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.apk.outputs.apk_path }}
          tag_name: ${{ env.TAG }}
          name: ${{ env.TAG }}
          draft: false
          prerelease: ${{ steps.check_beta.outputs.is_beta == 'true' }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trigger Update JSON Workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run update_json.yml --ref main -f tag_name=${{ env.TAG }}
