name: Update JSON

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Manual update for tag (empty for latest stable)'
        required: false
        default: ''

jobs:
  update_json:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout mytv-android-update repository
        uses: actions/checkout@v3
        with:
          repository: minyoad/mytv-android-update
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 0
          path: mytv-android-update

      - name: Get Release Data
        id: release_data
        uses: actions/github-script@v6
        with:
          script: |
            let release;
            if (context.eventName === 'release') {
              release = context.payload.release;
            } else {
              const tagName = context.payload.inputs.tag_name;
              if (tagName) {
                const response = await github.rest.repos.getReleaseByTag({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  tag: tagName,
                });
                release = response.data;
              } else {
                const response = await github.rest.repos.getLatestRelease({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                });
                release = response.data;
              }
            }
            
            const isBeta = release.prerelease || release.tag_name.includes('beta');
            const targetFile = isBeta ? 'tv-beta.json' : 'tv-stable.json';
            
            core.setOutput('tag_name', release.tag_name);
            core.setOutput('asset_url', release.assets[0].browser_download_url);
            core.setOutput('body', release.body);
            core.setOutput('target_file', targetFile);
            core.setOutput('is_beta', isBeta);

      - name: Update JSON File
        id: update_json
        working-directory: ./mytv-android-update
        run: |
          TAG_NAME="${{ steps.release_data.outputs.tag_name }}"
          ASSET_URL="${{ steps.release_data.outputs.asset_url }}"
          BODY="${{ steps.release_data.outputs.body }}"
          TARGET_FILE="${{ steps.release_data.outputs.target_file }}"
          
          echo "Updating $TARGET_FILE for version $TAG_NAME"

          NEW_CONTENT=$(jq -n --arg tag "$TAG_NAME" \
                           --arg url "$ASSET_URL" \
                           --arg body "$BODY" \
                           '{tag_name: $tag, assets: [{browser_download_url: $url}], body: $body}')
          
          echo "$NEW_CONTENT" > "$TARGET_FILE"
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "target_file=$TARGET_FILE" >> $GITHUB_OUTPUT

      - name: Commit and push changes
        working-directory: ./mytv-android-update
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add "${{ steps.update_json.outputs.target_file }}"
          git commit -m "Update ${{ steps.update_json.outputs.target_file }} to version ${{ steps.update_json.outputs.tag_name }}" || echo "No changes to commit"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
